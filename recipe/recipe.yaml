schema_version: 1

context:
  name: opentelemetry-sdk-extension-aws
  version: "2.1.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: ff68ddecc1910f62c019d22ec0f7461713ead7f662d6a2304d4089c1a0b20416

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - opentelemetry-sdk >=1.12,<2.dev0

tests:
  - python:
      imports:
        - opentelemetry.sdk.extension.aws.trace
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: AWS SDK extension for OpenTelemetry
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/open-telemetry/opentelemetry-python-contrib/tree/main/sdk-extension/opentelemetry-sdk-extension-aws

extra:
  recipe-maintainers:
    - jan-janssen
